# HPC platform definitions
# Used by llm-discovery validate/deploy/retrieve commands

platforms:
  gadi:
    display_name: "NCI Gadi"
    ssh_host: "gadi.nci.org.au"
    remote_base: "/scratch/{project}/llm-discovery"
    gpu_queue: "gpuvolta"
    gpu_type: "V100"
    submission: "pbs"
    modules:
      - "cuda/12.0"
      - "python3/3.12"
    checks:
      - name: "SSH connectivity"
        command: "hostname"
      - name: "/scratch accessible"
        command: "test -d /scratch/{project}"
      - name: "HF_TOKEN set"
        command: "test -n \"$HF_TOKEN\""
      - name: "uv available"
        command: "which uv"

  local-e4b:
    display_name: "Local RTX4090 (Gemma4 E4B)"
    ssh_host: null
    remote_base: "./data"
    gpu_type: "RTX4090"
    gpu_queue: "RTX4090-e4b"
    submission: "apptainer"
    checks:
      - name: "apptainer available"
        command: "which apptainer"
      - name: "NVIDIA GPU accessible"
        command: "nvidia-smi"

  local-oss20b:
    display_name: "Local RTX4090 (GPT-OSS 20B)"
    ssh_host: null
    remote_base: "./data"
    gpu_type: "RTX4090"
    gpu_queue: "RTX4090-oss20b"
    submission: "apptainer"
    checks:
      - name: "apptainer available"
        command: "which apptainer"
      - name: "NVIDIA GPU accessible"
        command: "nvidia-smi"

  ucloud:
    display_name: "DeiC UCloud"
    ssh_host: null
    remote_base: "/work/llm-discovery"
    gpu_type: "H100"
    submission: "api"
    modules: []
    checks:
      - name: "API endpoint reachable"
        command: null
